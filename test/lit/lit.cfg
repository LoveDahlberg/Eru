import os
import lit.formats

config.name = "CompilerTest"

# Not sure what this is?
config.test_format = lit.formats.ShTest(execute_external=True)

config.suffixes = ['.c', '.arda']
config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = None
config.excludes = ["Input"]

build_folder = os.environ.get("BUILD", "")

if not build_folder:
  print("No builder folder specified in BUILD")
  exit(1)

# Substitutions

config.substitutions.append(('%build', build_folder))
config.substitutions.append(('%processor', "env ERU_TMP_PATH=%t " + os.path.join(build_folder, "bin/eru")))
config.substitutions.append(('%stdlibFolder', os.path.join(build_folder, "Ainur/")))
config.substitutions.append(('%split-file', "split-file"))
config.substitutions.append(('%print-exit-code', 
    'sh -c \'"$@"; echo "Exit Code: $?"\' --'))

